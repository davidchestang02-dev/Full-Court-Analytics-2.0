name: Cache TeamRankings Matchups

on:
  schedule:
    # Daily at 6:15 AM ET (adjust as you like)
    - cron: "15 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run cache
        run: |
          python scraper/teamrankings_cache.py nba ncaab
          python scraper/scoresandodds_odds.py nba ncaab

      - name: Commit data updates
        run: |
          git config user.name "teamrankings-cache-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Daily cache update"
          git push
